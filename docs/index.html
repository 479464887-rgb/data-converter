<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Convert between bytes, KB, MB, GB, TB"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y=".9em" font-size='90'>🛠</text></svg>">
<title>Data Converter — DevKit Tools</title><style>:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:100%;}h1{font-size:20px;color:#f0f6fc;margin-bottom:20px;text-align:center;}input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font-size:20px;text-align:center;margin-bottom:12px;}input:focus{outline:none;border-color:var(--accent);}select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;margin-bottom:12px;}.mode{display:flex;gap:8px;margin-bottom:12px;justify-content:center;}.mode button{padding:6px 12px;font-size:12px;border-radius:6px;cursor:pointer;background:var(--surface);color:var(--text);border:1px solid var(--border);}.mode button.active{background:#238636;color:#fff;border-color:#238636;}.results{display:grid;gap:6px;}.r{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:13px;}.r .val{color:var(--accent);font-weight:600;}*:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}::selection{background:rgba(88,166,255,0.3);color:#fff}</style></head><body><div class="card"><h1>💾 Data Size</h1><div class="mode"><button class="active" onclick="setMode(1024,this)">Binary (1024)</button><button onclick="setMode(1000,this)">Decimal (1000)</button></div><input type="number" id="val" value="1" oninput="conv()"><select id="from" onchange="conv()"><option value="B">Bytes</option><option value="KB">KB</option><option value="MB" selected>MB</option><option value="GB">GB</option><option value="TB">TB</option></select><div class="results" id="results"></div></div><script>
'use strict';let base=1024;const units=['B','KB','MB','GB','TB'];function setMode(b,el){base=b;document.querySelectorAll('.mode button').forEach(x=>x.classList.remove('active'));el.classList.add('active');conv()}function conv(){const v=parseFloat(document.getElementById('val').value)||0;const fi=units.indexOf(document.getElementById('from').value);const bytes=v*Math.pow(base,fi);document.getElementById('results').innerHTML=units.filter((_,i)=>i!==fi).map((u,i)=>'<div class="r"><span>'+u+'</span><span class="val">'+(bytes/Math.pow(base,units.indexOf(u))).toFixed(4)+'</span></div>').join('')}conv();</script></body></html>
